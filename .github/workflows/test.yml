name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]

      - name: Run pytest
        run: |
          PYTHONPATH=src pytest tests/ -q --tb=short

      - name: Run import smoke test
        run: |
          PYTHONPATH=src python -c "
          from recall import Memory, HashEmbedder, MockLLMClient
          from recall.graph import graph_health, persistent_homology_summary, curvature_summary
          from recall.bound.conformal import crc_bound
          from recall.bound.rag_bound import composite_hallucination_bound
          from recall.consolidate import compute_pmed_components
          from recall.geometry.spectral import SpectralProjector
          mem = Memory(tenant='ci')
          mem.observe('Hello world.', 'OK')
          print('imports + roundtrip OK')
          "

  lint:
    name: ruff + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install ruff mypy
          ruff check src/recall || true   # advisory at v0.4
          # mypy src/recall || true        # advisory at v0.4

  benchmark-smoke:
    name: benchmark smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install -e .
          PYTHONPATH=src python benchmarks/synthetic_gamma/run.py
          PYTHONPATH=src python examples/quickstart.py
