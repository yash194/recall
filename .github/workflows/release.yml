name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  pypi:
    name: build and publish to PyPI (Trusted Publisher OIDC)
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # for PyPI Trusted Publisher
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No password needed — uses OIDC trusted publisher.
          # Configure at: pypi.org/manage/project/recall/settings/publishing/
          skip-existing: true

  docker:
    name: build and push Docker image (multi-arch)
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/recall:latest
            ghcr.io/${{ github.repository_owner }}/recall:${{ steps.version.outputs.version }}

  github-release:
    name: create GitHub release
    runs-on: ubuntu-latest
    needs: [pypi, docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
