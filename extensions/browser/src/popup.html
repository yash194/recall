<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Recall</title>
<style>
  body { font: 13px/1.4 -apple-system, sans-serif; padding: 16px; width: 280px; background: #1a1a1a; color: #e8e8e8; }
  h1 { font-size: 14px; margin: 0 0 12px; }
  label { font-size: 11px; opacity: 0.7; display: block; margin-bottom: 4px; }
  input { width: 100%; padding: 6px 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: inherit; border-radius: 4px; }
  .field { margin-bottom: 10px; }
  button { width: 100%; padding: 6px; background: rgba(80,120,200,0.4); border: 0; color: white; border-radius: 4px; cursor: pointer; }
  .stats { padding: 8px; background: rgba(255,255,255,0.04); border-radius: 6px; margin-top: 10px; font-size: 11px; }
</style>
</head>
<body>
<h1>Recall</h1>
<div class="field">
  <label>Recall server endpoint</label>
  <input id="endpoint" placeholder="http://localhost:8765" />
</div>
<div class="field">
  <label>Tenant id</label>
  <input id="tenant" placeholder="browser_user" />
</div>
<button id="save">Save</button>
<div class="stats" id="stats">—</div>
<script src="popup.js"></script>
</body>
</html>
